name: reading_log
description: "ReadingLog — Digital Reading Journal & Focus Companion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.3.0
  http: ^1.2.0
  cached_network_image: ^3.3.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  flutter_rating_bar: ^4.0.1
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/splash_image.png
    - assets/images/login_image.png
    - assets/images/home_banner.png
    - assets/images/empty_shelf.png
    - assets/images/pomodoro_default_bg.png
    - assets/icons/app_icon.png
